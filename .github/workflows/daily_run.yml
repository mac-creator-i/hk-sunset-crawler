name: Daily Sunset Tracker Pipeline

on:
  schedule:
    # Runs everyday at 9:00 AM HKT (which is 1:00 AM UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows you to also trigger it manually anytime with a button click

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Scraping Packages & Drivers
      run: |
        pip install requests beautifulsoup4 playwright openai
        playwright install chromium

    - name: Execute Main Scraper and Mail Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py
